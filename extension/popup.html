<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manassas Bill Downloader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
    }

    .header {
      background: #2d6a4f;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header svg { flex-shrink: 0; }
    .header-text { line-height: 1.2; }
    .header-text h1 { font-size: 15px; font-weight: 600; }
    .header-text p  { font-size: 11px; opacity: 0.85; margin-top: 2px; }

    .body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    .status-box {
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      padding: 10px 12px;
      font-size: 13px;
      color: #374151;
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-box.error   { background: #fef2f2; border-color: #fca5a5; color: #991b1b; }
    .status-box.success { background: #f0fdf4; border-color: #86efac; color: #166534; }
    .status-box.running { background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; }

    .progress-wrap { display: flex; flex-direction: column; gap: 6px; }
    .progress-label { font-size: 12px; color: #6b7280; display: flex; justify-content: space-between; }
    progress {
      width: 100%;
      height: 6px;
      border-radius: 9999px;
      border: none;
      overflow: hidden;
      appearance: none;
      -webkit-appearance: none;
      background: #e5e7eb;
    }
    progress::-webkit-progress-bar   { background: #e5e7eb; border-radius: 9999px; }
    progress::-webkit-progress-value { background: #2d6a4f; border-radius: 9999px; }

    .file-list {
      max-height: 160px;
      overflow-y: auto;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 12px;
    }
    .file-list-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-bottom: 1px solid #f3f4f6;
    }
    .file-list-item:last-child { border-bottom: none; }
    .file-list-item .dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-pending  { background: #d1d5db; }
    .dot-done     { background: #22c55e; }
    .dot-error    { background: #ef4444; }
    .dot-skip     { background: #60a5fa; }
    .file-list-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #374151; }
    .file-list-item .date { font-size: 11px; color: #9ca3af; flex-shrink: 0; }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s;
    }
    #startBtn {
      background: #2d6a4f;
      color: #fff;
    }
    #startBtn:hover:not(:disabled) { background: #1b4332; }
    #startBtn:disabled { background: #6b7280; cursor: not-allowed; }

    .footer {
      padding: 8px 16px 12px;
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #93c5fd;
      border-top-color: #1d4ed8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #progressSection { display: none; }
    #fileListSection  { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="12" y1="18" x2="12" y2="12"/>
      <line x1="9"  y1="15" x2="15" y2="15"/>
    </svg>
    <div class="header-text">
      <h1>Manassas Bill Downloader</h1>
      <p>Batch-download all InvoiceCloud PDFs</p>
    </div>
  </div>

  <div class="body">
    <div id="statusBox" class="status-box">
      Navigate to your InvoiceCloud billing page, then click below.
    </div>

    <div id="progressSection" class="progress-wrap">
      <div class="progress-label">
        <span id="progressLabel">Collecting…</span>
        <span id="progressCount"></span>
      </div>
      <progress id="progressBar" max="100" value="0"></progress>
    </div>

    <div id="fileListSection" class="file-list"></div>

    <button id="startBtn">Download All Bills</button>
  </div>

  <div class="footer">Files saved to <strong>Manassas Bills/</strong> in your Downloads folder</div>

  <script src="popup.js"></script>
</body>
</html>
